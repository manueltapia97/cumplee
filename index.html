<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Experiencia Cumpleañera</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at top,#2b1144,#000);
  color:white;
  overflow:hidden;
  text-align:center;
  min-height:100vh;
}

/* ✨ glow fondo */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,rgba(255,0,255,.18),transparent 25%),
    radial-gradient(circle at 80% 10%,rgba(0,140,255,.15),transparent 25%);
  pointer-events:none;
}

.container{
  width:100%;
  max-width:420px;
  margin:auto;
  min-height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  padding:24px;
  position:relative;
  z-index:2;
}

h1{
  font-size:2.3rem;
  margin-bottom:10px;
}

h2{
  font-size:1.4rem;
  margin-bottom:10px;
}

p{
  line-height:1.5;
  opacity:.92;
}

h5{
  opacity:.65;
  margin-bottom:20px;
}

/* 🎀 botones */
button{
  width:100%;
  max-width:280px;

  padding:15px 18px;
  margin:10px 0;

  border:none;
  border-radius:18px;

  background:
    linear-gradient(135deg,#7b2ff7,#f107a3);

  color:white;
  font-size:1rem;
  font-weight:700;

  cursor:pointer;

  box-shadow:
    0 10px 25px rgba(241,7,163,.25);

  transition:.25s;
}

button:hover{
  transform:translateY(-2px);
}

button:active{
  transform:scale(.96);
}

/* 🖼 imágenes */
img{
  width:100%;
  max-width:280px;

  margin-top:20px;

  border-radius:22px;

  box-shadow:
    0 15px 35px rgba(0,0,0,.45),
    0 0 25px rgba(255,255,255,.08);

  animation:fade .45s ease;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* 🎊 confeti */
.fx{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  z-index:999;
}

/* 📱 responsive */
@media(max-width:480px){

  h1{
    font-size:2rem;
  }

  h2{
    font-size:1.2rem;
  }

  p{
    font-size:.95rem;
  }

  button{
    padding:14px;
    font-size:.95rem;
  }

}

</style>
</head>

<body>

<!-- 🎵 AUDIO -->
<audio id="music" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container" id="app">

  <h1>🎤 Mini Experience</h1>

  <h2>Presiona y confía 😌</h2>

  <button id="startBtn">
    Entrar ✨
  </button>

</div>

<script>

const app = document.getElementById("app");
const music = document.getElementById("music");

/* 🔓 progreso */
let visitedRandom = false;
let visitedFlow = false;

/* 🚀 botón inicial */
document
  .getElementById("startBtn")
  .addEventListener("click", start);

/* 🚀 inicio */
function start(){

  app.innerHTML = `
    <h2>Ok... mood check 😏</h2>

    <p>¿Cómo va el día?</p>

    <h5>
      no podrás presionar
      "Medio meh" 😈
    </h5>

    <button id="goodBtn">
      Chill 😎
    </button>

    <button id="badBtn">
      Medio meh 😅
    </button>
  `;

  const bad =
    document.getElementById("badBtn");

  const good =
    document.getElementById("goodBtn");

  good.addEventListener("click", goodMood);

  function moveButton(){

    const x =
      Math.random()*120 - 60;

    const y =
      Math.random()*120 - 60;

    bad.style.transform =
      `translate(${x}px,${y}px)`;
  }

  bad.addEventListener(
    "mouseenter",
    moveButton
  );

  bad.addEventListener(
    "touchstart",
    moveButton
  );
}

/* 😌 mood */
function goodMood(){

  app.innerHTML = `
    <h2>Nice 😌</h2>

    <p>Sigamos...</p>

    <button id="continueBtn">
      Continuar ✨
    </button>
  `;

  document
    .getElementById("continueBtn")
    .addEventListener("click", next);
}

/* 🎶 menú */
function next(){

  const randomStatus =
    visitedRandom ? "✅" : "❌";

  const flowStatus =
    visitedFlow ? "✅" : "❌";

  app.innerHTML = `
    <h2>🎶 Elige tu vibe</h2>

    <p style="opacity:.7;">
      Explora los modos 😌
    </p>

    <button id="btsBtn">
      BTS 💜
    </button>

    <button id="randomBtn">
      Algo random 🎧 
    </button>

    <button id="flowBtn">
      Flow 🔥 
    </button>
  `;

  document
    .getElementById("btsBtn")
    .addEventListener("click", chooseBTS);

  document
    .getElementById("randomBtn")
    .addEventListener("click", chooseRandom);

  document
    .getElementById("flowBtn")
    .addEventListener("click", chooseFlow);
}

/* 🔊 música */
function playMusic(){

  music.currentTime = 0;
  music.volume = 0.5;

  music.play().catch(()=>{});
}

/* 💜 BTS */
function chooseBTS(){

  if(!(visitedRandom && visitedFlow)){

    app.innerHTML = `
      <h2>🔒 BTS bloqueado</h2>

      <p>
        Debes probar primero:
      </p>

      <p>
        🎧 Algo random<br>
        🔥 Flow
      </p>

      <button id="backBtn">
        Volver
      </button>
    `;

    document
      .getElementById("backBtn")
      .addEventListener("click", next);

    return;
  }

  playMusic();

  app.innerHTML = `
    <h2>Sabía que ibas por BTS 😏</h2>

    <p>Buena elección 💜</p>

    <img src="img1.jpg">

    <button id="backBtn">
      ⬅ Atrás
    </button>

    <button id="finalBtn">
      Continuar ✨
    </button>
  `;

  document
    .getElementById("backBtn")
    .addEventListener("click", next);

  document
    .getElementById("finalBtn")
    .addEventListener("click", finalScreen);
}

/* 🎧 random */
function chooseRandom(){

  visitedRandom = true;

  playMusic();

  app.innerHTML = `
    <h2>
      Interesante 😎
    </h2>

    <p>
      100% 🔊<br>
      NO ENTIENDOO!
    </p>

    <img src="Jungkook.jpg">

    <button id="backBtn">
      ⬅ Atrás
    </button>
  `;

  document
    .getElementById("backBtn")
    .addEventListener("click", next);
}

/* 🔥 flow */
function chooseFlow(){

  visitedFlow = true;

  playMusic();

  app.innerHTML = `
    <h2>
      Flow detectado 🔥
    </h2>

    <p>
      solo hay audio
      de BTS 😄
    </p>
    <p>100% 🔊, <br> 
    sin reglas 😌
    </p>
    <img src="dori.jpg">

    <button id="backBtn">
      ⬅ Atrás
    </button>
  `;

  document
    .getElementById("backBtn")
    .addEventListener("click", next);
}

/* 🎊 confeti */
function confetti(){

  const interval =
    setInterval(()=>{

    const c =
      document.createElement("div");

    c.className = "fx";

    c.style.background =
      `hsl(${Math.random()*360},
      100%,50%)`;

    c.style.left =
      Math.random()*100+"vw";

    c.style.top = "-10px";

    document.body.appendChild(c);

    let y = 0;

    const anim =
      setInterval(()=>{

      y += 6;

      c.style.transform =
        `translateY(${y}px)`;

      if(y > window.innerHeight){

        clearInterval(anim);
        c.remove();
      }

    },16);

  },70);

  setTimeout(()=>{
    clearInterval(interval);
  },5000);
}

/* 🎉 final */
function finalScreen(){

  app.innerHTML = `
    <h1>🎉 Feliz Cumple 🎉</h1>

    <h2>
      Crystel Lissette 💜
    </h2>

    <p>
      No sabía qué regalarte,
      así que salió esto 😅
    </p>

    <p>
      Un detalle sencillo
      para hoy 😌
    </p>

    <img src="img_concierto.png">

    <p>07/10/2026</p>

    <p style="opacity:.6;">
      (bonus track incluido 🎶)
    </p>
  `;

  confetti();
}

</script>

</body>
</html>
