<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎤 Presiona y confía</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at top,#2b1144,#000);
  color:white;
  overflow:hidden;
  text-align:center;
  min-height:100vh;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,rgba(255,0,255,.18),transparent 25%),
    radial-gradient(circle at 80% 10%,rgba(0,140,255,.15),transparent 25%);
  pointer-events:none;
}

.container{
  width:100%;
  max-width:420px;
  margin:auto;
  min-height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  padding:24px;
  position:relative;
  z-index:2;
}

h1{
  font-size:2.3rem;
  margin-bottom:10px;
}

h2{
  font-size:1.4rem;
  font-weight:500;
  margin-bottom:10px;
}

p{
  font-size:1rem;
  line-height:1.5;
  opacity:.9;
}

h5{
  opacity:.6;
  margin-bottom:20px;
}

button{
  width:100%;
  max-width:280px;

  padding:15px 20px;
  margin:10px 0;

  border:none;
  border-radius:18px;

  cursor:pointer;

  background:linear-gradient(
    135deg,
    #7b2ff7,
    #f107a3
  );

  color:white;
  font-size:1rem;
  font-weight:700;

  box-shadow:
    0 10px 25px rgba(241,7,163,.25);

  transition:.25s;
}

button:active{
  transform:scale(.96);
}

button:hover{
  transform:translateY(-2px);
}

img{
  width:100%;
  max-width:280px;

  margin-top:20px;

  border-radius:22px;

  box-shadow:
    0 15px 35px rgba(0,0,0,.45),
    0 0 25px rgba(255,255,255,.08);

  animation:fade .5s ease;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.fx{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  z-index:999;
}

@media(max-width:480px){

  h1{
    font-size:2rem;
  }

  h2{
    font-size:1.2rem;
  }

  p{
    font-size:.95rem;
  }

  button{
    font-size:.95rem;
    padding:14px;
  }

}

</style>
</head>

<body>

<audio id="music" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container" id="app">
  <h2>Presiona y confía 😌</h2>

  <button onclick="start()">
    Entrar ✨
  </button>
</div>

<script>

const app = document.getElementById("app");
const music = document.getElementById("music");

let btsUnlocked = false;

function start(){

  app.innerHTML = `
    <h2>Ok... mood check 😏</h2>

    <p>¿Cómo va el día?</p>

    <h5>
      no podrás presionar el botón
      "Medio meh" 😈
    </h5>

    <button onclick="good()">
      Chill 😎
    </button>

    <button id="bad">
      Medio meh 😅
    </button>
  `;

  const bad = document.getElementById("bad");

  function moveButton(){

    const x = Math.random()*120 - 60;
    const y = Math.random()*120 - 60;

    bad.style.transform =
      `translate(${x}px,${y}px)`;
  }

  bad.addEventListener("mouseover",moveButton);
  bad.addEventListener("touchstart",moveButton);
}

function good(){

  app.innerHTML = `
    <h2>Nice 😌</h2>

    <p>Sigamos...</p>

    <button onclick="next()">
      Continuar ✨
    </button>
  `;
}

function next(){

  const status1 =
    visitedRandom ? "✅" : "❌";

  const status2 =
    visitedFlow ? "✅" : "❌";

  app.innerHTML = `
    <h2>🎶 Elige tu vibe</h2>

    <p style="opacity:.7;">
      Desbloquea BTS explorando
      los otros modos 😌
    </p>

    <button onclick="choose()">
      BTS 💜
    </button>

    <button onclick="choose1()">
      Algo random 🎧 ${status1}
    </button>

    <button onclick="choose2()">
      Flow 🔥 ${status2}
    </button>
  `;
}
  
function playMusic(){

  music.currentTime = 0;
  music.volume = 0.5;

  music.play().catch(()=>{});
}
function choose(){

  if(!(visitedRandom && visitedFlow)){

    app.innerHTML = `
      <h2>🔒 BTS bloqueado</h2>

      <p>
        Debes probar:
      </p>

      <p>
        🎧 Algo random<br>
        🔥 Flow
      </p>

      <button onclick="next()">
        Volver
      </button>
    `;

    return;
  }

  playMusic();

  app.innerHTML = `
    <h2>Sabía que ibas por BTS 😏</h2>

    <p>Buena elección 💜</p>

    <img src="img1.jpg">

    <button onclick="next()">
      ⬅ Atrás
    </button>

    <button onclick="final()">
      Continuar ✨
    </button>
  `;
}

function choose1(){

  visitedRandom = true;

  playMusic();

  app.innerHTML = `
    <h2>
      Interesante,
      pero solo BTS 😎
    </h2>

    <p>
      100% 🔊,
      NO ENTIENDOO!
    </p>

    <img src="Jungkook.jpg">

    <button onclick="next()">
      ⬅ Atrás
    </button>
  `;
}

function choose2(){

  visitedFlow = true;

  playMusic();

  app.innerHTML = `
    <h2>
      Flow detectado 🔥
    </h2>

    <p>
      solo hay audio de BTS 😄
    </p>

    <img src="dori.jpg">

    <button onclick="next()">
      ⬅ Atrás
    </button>
  `;
}

function confetti(){

  const interval = setInterval(()=>{

    const c =
      document.createElement("div");

    c.className = "fx";

    c.style.background =
      `hsl(${Math.random()*360},
      100%,50%)`;

    c.style.left =
      Math.random()*100+"vw";

    c.style.top = "-10px";

    document.body.appendChild(c);

    let y = 0;

    const anim = setInterval(()=>{

      y += 6;

      c.style.transform =
        `translateY(${y}px)`;

      if(y > window.innerHeight){

        clearInterval(anim);

        c.remove();
      }

    },16);

  },70);

  setTimeout(
    ()=>clearInterval(interval),
    5000
  );
}

function final(){

  app.innerHTML = `
    <h1>🎉 Feliz Cumple 🎉</h1>

    <h2>Crystel Lissette 💜</h2>

    <p>
      No sabía qué regalarte,
      así que salió esto 😅
    </p>

    <p>
      Un detalle sencillo
      para hoy 😌
    </p>

    <img src="img_concierto.png">

    <p>07/10/2026</p>

    <p style="opacity:.6;">
      (bonus track incluido 🎶)
    </p>
  `;

  confetti();
}

</script>

</body>
</html>
